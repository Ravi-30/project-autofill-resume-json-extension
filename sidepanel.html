<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>AutoFill Resume</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <!-- Navigation Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="home-tab">Controls</button>
      <button class="tab-btn" data-tab="history-tab">History</button>
      <button class="tab-btn" data-tab="manage-tab">Manage Data</button>
    </div>

    <div id="home-tab" class="tab-content" style="position: relative; min-height: 400px;">
      <div class="header">
        <div class="logo-title">
          <img src="icons/logo_sidepanel.png" alt="TalentScreen Logo"
            style="width: 52px; height: 52px; object-fit: contain;">
          <h2 style="font-size: 1.6rem; margin: 0; font-weight: 800; color: var(--text);">TalentScreen Autofill</h2>
        </div>
      </div>


      <!-- Progress Section -->
      <div id="progressSection" class="progress-section hidden">
        <div class="progress-info">
          <span class="progress-label">Form Progress</span>
          <span id="progressCount" class="progress-count">0/0 fields</span>
        </div>
        <div class="progress-bar-container">
          <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>
      </div>

      <div id="mainView">
        <!-- Setup Status Message -->
        <div id="setupSuccess" class="setup-message hidden" style="margin-bottom: 16px;">
          <div class="setup-icon"
            style="background-color: var(--success); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; margin-right: 8px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="12" height="12">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <span>Set up is good! Ready to autofill.</span>
        </div>

        <button id="fillFormBtn" class="action-btn" style="margin-bottom: 16px;">
          Autofill
        </button>

        <!-- 1. JSON Management -->
        <div class="action-row" style="margin-bottom: 12px;">
          <label for="resumeInput" class="upload-btn-styled">
            <span>Upload JSON</span>
          </label>
          <input type="file" id="resumeInput" accept=".json" class="hidden">
        </div>

        <!-- 2. PDF Management -->
        <div class="action-row" style="margin-bottom: 12px;">
          <input type="file" id="resumeFileInput" accept=".pdf,.doc,.docx" class="hidden">
          <button id="uploadPdfBtn" class="upload-btn-styled">
            <span id="pdfStatusText">Upload PDF</span>
          </button>
        </div>

      </div>

    </div><!-- End of home-tab -->

    <!-- Floating Sample Download Button (Outside tabs to stay at bottom) -->
    <a href="sample_resume.json" id="sampleDownloadBtn" download="sample_resume.json" class="sample-download-btn"
      title="Download Sample JSON">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      Sample JSON
    </a>

    <!-- Status Message -->
    <div id="status" class="hidden"></div>

    <!-- History Tab -->
    <div id="history-tab" class="tab-content hidden">
      <div class="history-header"
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3 style="margin: 0;">Application History</h3>
        <button id="clearHistoryBtn" class="secondary-btn"
          style="padding: 4px 8px; font-size: 11px; width: auto; margin: 0;">Clear All</button>
      </div>
      <div id="historyList" class="history-list">
        <p style="text-align: center; color: var(--text-muted); font-size: 12px; margin-top: 20px;">No applications
          logged
          yet.</p>
      </div>
    </div>

    <!-- Manage Data Tab -->
    <div id="manage-tab" class="tab-content hidden"
      style="display: flex; flex-direction: column; height: calc(100vh - 80px);">
      <div class="manage-header" style="margin-bottom: 12px;">
        <h3 style="margin: 0;">Manage Data</h3>
      </div>
      <textarea id="resumeEditTextarea" placeholder="Paste your resume JSON here..."
        style="flex-grow: 1; width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 0.75rem; resize: none; margin-bottom: 12px; box-sizing: border-box; min-height: 200px;"></textarea>
      <div class="manage-footer" style="display: flex; flex-direction: column; gap: 8px;">
        <button id="saveDataBtn" class="action-btn">Save Changes</button>
        <button id="deleteProfileBtn" class="danger-btn-flat">Remove All Data</button>
      </div>
    </div>

  </div>
  <script src="resumeProcessor.js"></script>
  <script src="sidepanel.js"></script>
</body>

</html>
